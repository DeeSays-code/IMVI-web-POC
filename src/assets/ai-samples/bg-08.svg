<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1120" preserveAspectRatio="xMidYMid slice">
  <!-- 08 · NEON PARADE — magenta field with sky-blue confetti stars + sweeping brush arcs -->
  <defs>
    <radialGradient id="b8-base" cx="50%" cy="55%" r="85%">
      <stop offset="0%" stop-color="#E65BA6"/>
      <stop offset="55%" stop-color="#B42A74"/>
      <stop offset="100%" stop-color="#7C124F"/>
    </radialGradient>
    <filter id="b8-paint" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" seed="9" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="20"/>
    </filter>
    <filter id="b8-paint-fine">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="2" seed="19" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="10"/>
    </filter>
    <filter id="b8-spray">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.68 0 0 0 0 0.86 0 0 0 0 0.95 0 0 0 0.3 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- 1. Magenta base -->
  <rect width="800" height="1120" fill="url(#b8-base)"/>

  <!-- 2. Sky blue corner wedges distressed -->
  <g filter="url(#b8-paint)">
    <path d="M-60 -60 L 340 -60 C 320 80 260 60 200 160 C 140 240 40 220 -60 280 Z" fill="#A3DBF2" opacity="0.88"/>
    <path d="M860 -60 L 480 -60 C 500 80 540 80 600 160 C 660 240 760 220 860 280 Z" fill="#A3DBF2" opacity="0.88"/>
    <path d="M-60 1180 L 320 1180 C 300 1040 240 1060 180 980 C 120 900 20 940 -60 900 Z" fill="#A3DBF2" opacity="0.88"/>
    <path d="M860 1180 L 520 1180 C 540 1040 600 1060 660 980 C 720 900 820 940 860 900 Z" fill="#A3DBF2" opacity="0.88"/>
  </g>

  <!-- 3. Big sweeping brush arc (light blue) across middle -->
  <g filter="url(#b8-paint-fine)">
    <path d="M-20 600 C 200 540 380 640 540 580 C 680 530 780 590 820 560"
          stroke="#A3DBF2" stroke-width="18" fill="none" opacity="0.75" stroke-linecap="round"/>
    <path d="M-20 700 C 200 640 380 720 540 660 C 680 610 780 670 820 640"
          stroke="#FFFFFF" stroke-width="7" fill="none" opacity="0.65" stroke-linecap="round"/>
  </g>

  <!-- 4. Star-confetti scattered -->
  <g fill="#A3DBF2">
    <polygon points="140,290 160,254 180,290 218,302 180,314 160,350 140,314 102,302"/>
    <polygon points="660,290 680,254 700,290 738,302 700,314 680,350 660,314 622,302"/>
    <polygon points="140,860 160,824 180,860 218,872 180,884 160,920 140,884 102,872"/>
    <polygon points="660,860 680,824 700,860 738,872 700,884 680,920 660,884 622,872"/>
    <polygon points="420,430 435,402 450,430 482,440 450,450 435,478 420,450 388,440" opacity="0.95"/>
    <polygon points="280,580 294,556 308,580 334,588 308,596 294,620 280,596 254,588" opacity="0.9"/>
    <polygon points="520,600 534,576 548,600 574,608 548,616 534,640 520,616 494,608" opacity="0.9"/>
    <polygon points="230,780 240,762 250,780 266,786 250,792 240,810 230,792 214,786" opacity="0.85"/>
    <polygon points="570,770 580,752 590,770 606,776 590,782 580,800 570,782 554,776" opacity="0.85"/>
  </g>

  <!-- 5. White plus sparkles everywhere (this is the parade vibe) -->
  <g stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round">
    <path d="M120 220 L120 240 M110 230 L130 230"/>
    <path d="M680 220 L680 240 M670 230 L690 230"/>
    <path d="M320 360 L320 378 M311 369 L329 369"/>
    <path d="M500 360 L500 378 M491 369 L509 369"/>
    <path d="M200 780 L200 798 M191 789 L209 789"/>
    <path d="M580 780 L580 798 M571 789 L589 789"/>
    <path d="M360 880 L360 898 M351 889 L369 889"/>
    <path d="M440 960 L440 980 M431 970 L449 970"/>
    <path d="M260 460 L260 476 M252 468 L268 468"/>
    <path d="M560 430 L560 446 M552 438 L568 438"/>
    <path d="M400 720 L400 740 M391 730 L409 730"/>
  </g>

  <!-- 6. Magenta deeper paint splatter accents -->
  <g filter="url(#b8-paint)">
    <path d="M260 540 C 340 510 400 580 360 620 C 310 650 250 610 260 540 Z" fill="#6D0E44" opacity="0.7"/>
    <path d="M470 540 C 540 510 600 570 560 610 C 510 640 450 600 470 540 Z" fill="#6D0E44" opacity="0.7"/>
  </g>

  <!-- 7. Confetti dots -->
  <g fill="#A3DBF2">
    <circle cx="220" cy="440" r="5"/><circle cx="600" cy="480" r="5"/>
    <circle cx="340" cy="540" r="4"/><circle cx="500" cy="550" r="4"/>
    <circle cx="410" cy="700" r="3.5"/><circle cx="280" cy="720" r="3.5"/>
    <circle cx="530" cy="760" r="3"/><circle cx="180" cy="600" r="3.5"/>
    <circle cx="640" cy="620" r="3"/>
  </g>

  <!-- 8. Chevrons upward bottom-center -->
  <g fill="none" stroke="#A3DBF2" stroke-width="4" stroke-linecap="round">
    <path d="M380 1050 L400 1070 L420 1050"/>
    <path d="M365 1020 L400 1055 L435 1020" opacity="0.65"/>
    <path d="M350 990 L400 1040 L450 990" opacity="0.4"/>
  </g>

  <!-- 9. Halftone top-right + bottom-left -->
  <g fill="#A3DBF2" opacity="0.82">
    <circle cx="760" cy="60" r="3"/><circle cx="730" cy="60" r="2.5"/><circle cx="700" cy="60" r="2"/><circle cx="670" cy="60" r="1.4"/>
    <circle cx="740" cy="90" r="2.5"/><circle cx="710" cy="90" r="2"/><circle cx="680" cy="90" r="1.4"/>
    <circle cx="750" cy="120" r="2"/><circle cx="720" cy="120" r="1.4"/>
    <circle cx="60" cy="1040" r="3"/><circle cx="90" cy="1040" r="2.5"/><circle cx="120" cy="1040" r="2"/><circle cx="150" cy="1040" r="1.4"/>
    <circle cx="70" cy="1070" r="2.5"/><circle cx="100" cy="1070" r="2"/><circle cx="130" cy="1070" r="1.4"/>
    <circle cx="80" cy="1100" r="2"/>
  </g>

  <!-- 10. Spray overlay -->
  <rect width="800" height="1120" filter="url(#b8-spray)" opacity="0.2"/>

  <!-- 11. Inner frame -->
  <rect x="24" y="24" width="752" height="1072" rx="18" ry="18" fill="none" stroke="#A3DBF2" stroke-width="1.4" opacity="0.7"/>
</svg>
