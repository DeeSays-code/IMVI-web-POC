<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1120" preserveAspectRatio="xMidYMid slice">
  <!-- 02 · ELECTRIC · royal blue wedge, sky confetti, electric spray trail -->
  <defs>
    <linearGradient id="b2-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDEFF5"/>
      <stop offset="100%" stop-color="#C8D1E3"/>
    </linearGradient>
    <linearGradient id="b2-royal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2558F4"/>
      <stop offset="55%" stop-color="#163CB8"/>
      <stop offset="100%" stop-color="#0A1F6E"/>
    </linearGradient>
    <filter id="b2-paint" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" seed="13" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="20"/>
    </filter>
    <filter id="b2-paint-fine" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="2" seed="3" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="12"/>
    </filter>
    <filter id="b2-spray">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="17"/>
      <feColorMatrix values="0 0 0 0 0.08 0 0 0 0 0.3 0 0 0 0 0.94 0 0 0 0.55 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- 1. Light base -->
  <rect width="800" height="1120" fill="url(#b2-base)"/>

  <!-- 2. Massive royal blue wedge, distressed edge -->
  <g filter="url(#b2-paint)">
    <path d="M-40 -40 L540 -40 L 460 220 L 540 340 L 380 560 L 460 680 L 300 860 L 400 1020 L 260 1160 L-40 1160 Z"
          fill="url(#b2-royal)"/>
  </g>

  <!-- 3. Electric spray trail along wedge boundary -->
  <g filter="url(#b2-spray)">
    <path d="M540 -20 L 460 220 L 540 340 L 380 560 L 460 680 L 300 860 L 400 1020 L 260 1160"
          stroke="#2558F4" stroke-width="80" fill="none" opacity="0.9"/>
  </g>

  <!-- 4. Bolt-shape electric strike top-right -->
  <g filter="url(#b2-paint)">
    <path d="M620 40 L 680 220 L 720 200 L 640 440 L 720 420 L 620 720 L 740 540 L 680 560 L 760 340 L 680 360 L 740 120 Z"
          fill="#2558F4" opacity="0.85"/>
  </g>

  <!-- 5. White drops/sparkles over blue wedge -->
  <g fill="#FFFFFF">
    <path d="M160 220 C 200 200 240 240 210 280 C 180 310 130 270 160 220 Z" filter="url(#b2-paint-fine)"/>
    <path d="M100 460 C 140 440 180 480 150 520 C 120 550 70 510 100 460 Z" filter="url(#b2-paint-fine)"/>
    <path d="M240 780 C 280 760 320 800 290 840 C 260 870 210 830 240 780 Z" filter="url(#b2-paint-fine)"/>
    <circle cx="120" cy="120" r="5"/><circle cx="220" cy="180" r="3"/>
    <circle cx="80" cy="300" r="4"/><circle cx="260" cy="340" r="3"/>
    <circle cx="180" cy="520" r="5"/><circle cx="100" cy="600" r="3.5"/>
    <circle cx="260" cy="680" r="3"/><circle cx="150" cy="920" r="4"/>
    <circle cx="70" cy="1020" r="5"/><circle cx="300" cy="980" r="3"/>
  </g>

  <!-- 6. Heavy blue paint cluster upper-right (on light side) -->
  <g filter="url(#b2-paint)">
    <path d="M640 40 C 740 20 790 120 740 200 C 700 260 600 240 580 180 C 560 120 580 60 640 40 Z"
          fill="#163CB8"/>
    <path d="M580 280 C 640 260 680 320 640 360 C 610 390 550 370 580 280 Z"
          fill="#2558F4" opacity="0.92"/>
  </g>
  <g filter="url(#b2-paint-fine)">
    <path d="M680 240 Q 684 300 680 360 Q 676 400 684 440" stroke="#163CB8" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M560 300 Q 564 380 560 460" stroke="#2558F4" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.85"/>
  </g>
  <g fill="#0A1F6E">
    <circle cx="680" cy="320" r="6"/><circle cx="720" cy="280" r="4"/>
    <circle cx="540" cy="200" r="5"/><circle cx="500" cy="240" r="3"/>
    <circle cx="760" cy="200" r="4"/><circle cx="480" cy="140" r="3"/>
    <circle cx="740" cy="100" r="3"/>
  </g>

  <!-- 7. Yellow accent burst break at mid-right (asymmetric color punch) -->
  <g filter="url(#b2-paint)">
    <path d="M620 580 C 690 560 740 620 700 660 C 660 700 580 680 580 620 C 580 600 600 590 620 580 Z"
          fill="#FFC82A"/>
  </g>
  <g fill="#FFC82A">
    <circle cx="720" cy="700" r="3"/><circle cx="660" cy="740" r="3.5"/>
    <circle cx="580" cy="720" r="2.5"/>
  </g>

  <!-- 8. Secondary dark blue splatter bottom-right -->
  <g filter="url(#b2-paint)">
    <path d="M560 840 C 620 820 660 870 630 910 C 600 940 540 910 560 840 Z" fill="#0A1F6E" opacity="0.88"/>
  </g>
  <g fill="#0A1F6E">
    <circle cx="640" cy="940" r="5"/><circle cx="700" cy="900" r="4"/>
    <circle cx="600" cy="980" r="3.5"/><circle cx="560" cy="1000" r="3"/>
    <circle cx="720" cy="980" r="3"/>
  </g>

  <!-- 9. Chevron stack bottom-left on blue -->
  <g fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round">
    <path d="M40 1040 L70 1070 L40 1100"/>
    <path d="M70 1040 L100 1070 L70 1100" opacity="0.65"/>
    <path d="M100 1040 L130 1070 L100 1100" opacity="0.4"/>
  </g>

  <!-- 10. Chevron stack top-right on light -->
  <g fill="none" stroke="#163CB8" stroke-width="3.5" stroke-linecap="round">
    <path d="M760 40 L730 70 L760 100"/>
    <path d="M760 100 L730 130 L760 160" opacity="0.7"/>
    <path d="M760 160 L730 190 L760 220" opacity="0.4"/>
  </g>

  <!-- 11. Halftone dots bottom-right -->
  <g fill="#163CB8" opacity="0.8">
    <circle cx="520" cy="1020" r="3.5"/><circle cx="560" cy="1020" r="3"/><circle cx="600" cy="1020" r="2.5"/><circle cx="640" cy="1020" r="2"/><circle cx="680" cy="1020" r="1.3"/>
    <circle cx="540" cy="1055" r="3"/><circle cx="580" cy="1055" r="2.5"/><circle cx="620" cy="1055" r="2"/><circle cx="660" cy="1055" r="1.3"/>
    <circle cx="560" cy="1090" r="2.5"/><circle cx="600" cy="1090" r="2"/><circle cx="640" cy="1090" r="1.3"/>
  </g>

  <!-- 12. Plus-sparkles -->
  <g stroke="#163CB8" stroke-width="2.4" stroke-linecap="round" opacity="0.8">
    <path d="M500 400 L500 420 M490 410 L510 410"/>
    <path d="M640 540 L640 560 M630 550 L650 550"/>
    <path d="M500 640 L500 656 M490 648 L510 648"/>
    <path d="M720 480 L720 498 M711 489 L729 489"/>
    <path d="M580 680 L580 696 M572 688 L588 688"/>
  </g>
  <g stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" opacity="0.8">
    <path d="M120 640 L120 660 M110 650 L130 650"/>
    <path d="M250 440 L250 458 M241 449 L259 449"/>
    <path d="M80 780 L80 798 M71 789 L89 789"/>
  </g>

  <!-- 13. Inner frame -->
  <rect x="24" y="24" width="752" height="1072" rx="18" ry="18" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
</svg>
