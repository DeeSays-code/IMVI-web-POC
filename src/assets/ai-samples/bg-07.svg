<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1120" preserveAspectRatio="xMidYMid slice">
  <!-- 07 · SUNBURST — yellow field, black ink pouring from top, heavy drips -->
  <defs>
    <linearGradient id="b7-yellow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE54B"/>
      <stop offset="100%" stop-color="#E8B910"/>
    </linearGradient>
    <filter id="b7-paint" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" seed="7" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="22"/>
    </filter>
    <filter id="b7-paint-fine" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="2" seed="23" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="12"/>
    </filter>
    <filter id="b7-spray">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="13"/>
      <feColorMatrix values="0 0 0 0 0.06 0 0 0 0 0.06 0 0 0 0 0.06 0 0 0 0.35 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- 1. Yellow base -->
  <rect width="800" height="1120" fill="url(#b7-yellow)"/>

  <!-- 2. Black ink band pouring from top — torn rough edge -->
  <g filter="url(#b7-paint)">
    <path d="M0 0 L800 0 L800 320 L760 300 L720 330 L680 310 L640 335 L600 315 L560 340 L520 320 L480 345 L440 325 L400 350 L360 330 L320 355 L280 335 L240 360 L200 340 L160 365 L120 345 L80 370 L40 350 L0 370 Z"
          fill="#0E0E0E"/>
  </g>

  <!-- 3. Long black drip tendrils extending downward -->
  <g filter="url(#b7-paint-fine)">
    <path d="M120 340 Q 124 400 120 460 Q 116 520 124 580 Q 122 620 114 640" stroke="#0E0E0E" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M240 360 Q 244 440 240 520" stroke="#0E0E0E" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M360 350 Q 364 430 360 520 Q 356 600 364 680" stroke="#0E0E0E" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M460 370 Q 464 430 460 490" stroke="#0E0E0E" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M560 355 Q 564 430 560 520 Q 556 600 564 680 Q 562 720 554 740" stroke="#0E0E0E" stroke-width="17" fill="none" stroke-linecap="round"/>
    <path d="M680 345 Q 684 420 680 500" stroke="#0E0E0E" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M740 360 Q 744 430 740 500 Q 736 560 744 620" stroke="#0E0E0E" stroke-width="13" fill="none" stroke-linecap="round" opacity="0.92"/>
    <path d="M80 370 Q 84 430 80 500 Q 76 560 84 620" stroke="#0E0E0E" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M180 350 Q 184 420 180 490" stroke="#0E0E0E" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M300 340 Q 304 410 300 480" stroke="#0E0E0E" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.88"/>
  </g>
  <!-- Drip endings (blobby stops) -->
  <g filter="url(#b7-paint-fine)">
    <circle cx="120" cy="640" r="14" fill="#0E0E0E"/>
    <circle cx="360" cy="680" r="14" fill="#0E0E0E"/>
    <circle cx="560" cy="740" r="14" fill="#0E0E0E"/>
  </g>

  <!-- 4. Big black splatter bottom-right -->
  <g filter="url(#b7-paint)">
    <path d="M560 800 C 640 780 720 860 680 920 C 640 970 540 940 560 800 Z" fill="#0E0E0E"/>
    <path d="M460 900 C 510 880 560 930 520 970 C 480 1000 430 970 460 900 Z" fill="#0E0E0E"/>
  </g>
  <g fill="#0E0E0E">
    <circle cx="700" cy="960" r="7"/><circle cx="760" cy="900" r="5"/>
    <circle cx="620" cy="1000" r="4.5"/><circle cx="500" cy="1000" r="4"/>
    <circle cx="420" cy="960" r="3"/><circle cx="760" cy="1020" r="3"/>
  </g>

  <!-- 5. Heavy diagonal black brush strike mid -->
  <g filter="url(#b7-paint)">
    <path d="M-20 600 C 200 560 380 640 540 580 C 680 540 780 600 820 570"
          stroke="#0E0E0E" stroke-width="22" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 6. White accent speckles (cloud spots) on yellow -->
  <g fill="#FFFFFF" opacity="0.55">
    <circle cx="120" cy="480" r="4"/><circle cx="280" cy="520" r="3"/>
    <circle cx="420" cy="460" r="2.5"/><circle cx="580" cy="520" r="3"/>
    <circle cx="300" cy="740" r="3.5"/><circle cx="480" cy="700" r="3"/>
    <circle cx="640" cy="780" r="2.5"/>
  </g>

  <!-- 7. Spray overlay -->
  <rect width="800" height="1120" filter="url(#b7-spray)" opacity="0.22"/>

  <!-- 8. Chevrons top-left + bottom-right -->
  <g fill="none" stroke="#FFE54B" stroke-width="4" stroke-linecap="round">
    <path d="M60 60 L30 90 L60 120"/>
    <path d="M60 120 L30 150 L60 180" opacity="0.7"/>
    <path d="M60 180 L30 210 L60 240" opacity="0.4"/>
  </g>
  <g fill="none" stroke="#0E0E0E" stroke-width="4" stroke-linecap="round">
    <path d="M720 1040 L750 1070 L720 1100"/>
    <path d="M750 1040 L780 1070 L750 1100" opacity="0.65"/>
  </g>

  <!-- 9. Halftone bottom-left on yellow -->
  <g fill="#0E0E0E" opacity="0.8">
    <circle cx="50" cy="1000" r="3.5"/><circle cx="90" cy="1000" r="3"/><circle cx="130" cy="1000" r="2.5"/><circle cx="170" cy="1000" r="2"/>
    <circle cx="70" cy="1035" r="3"/><circle cx="110" cy="1035" r="2.5"/><circle cx="150" cy="1035" r="2"/>
    <circle cx="90" cy="1070" r="2.5"/><circle cx="130" cy="1070" r="2"/>
  </g>

  <!-- 10. Plus sparkles yellow zone -->
  <g stroke="#0E0E0E" stroke-width="2.4" stroke-linecap="round" opacity="0.8">
    <path d="M180 460 L180 478 M170 469 L190 469"/>
    <path d="M300 520 L300 536 M292 528 L308 528"/>
    <path d="M480 500 L480 516 M471 508 L489 508"/>
    <path d="M660 540 L660 556 M651 548 L669 548"/>
    <path d="M260 780 L260 796 M251 788 L269 788"/>
    <path d="M380 840 L380 856 M371 848 L389 848"/>
  </g>

  <!-- 11. Inner frame -->
  <rect x="24" y="24" width="752" height="1072" rx="18" ry="18" fill="none" stroke="#0E0E0E" stroke-width="1.4" opacity="0.4"/>
</svg>
